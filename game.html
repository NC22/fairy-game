    env.isWall = function(c, r) {

  // ---- Annotations ----

  // ---- Combat helper ----

    if (typeof min == 'undefined') min = 1; 
    var max = a - (d||0) + randi(rndAMin, rndAMax);

  };

  // ---- Sprite draw helper ----
  env.drawSpr = function(ctx, k, x, y, sz) {

      if (sz === 1) {

        ctx.drawImage(s.img, x - sz1/2 + s.ox, y - sz1/2 + s.oy, sz1, sz1);
      }
    } 
  }

  env.spawnDmgNum = function(wx, wy, dmg, col) {

  env.getNPCTpl = function(key) {
       for (var i=0; i < NPC_TMPL.length; i++) {

  env.drawInteractHint = function(c, r, drawX, drawY, text, options) {
    if(env.player){
      
      if (typeof options == 'undefined') options = {checkD : 1, fontSize : 7, fromC : env.player.c, fromR : env.player.r};
            
      var d = mdist(c, r, options.fromC, options.fromR);

  // ---- Projectile factory ----
  function spawnProjectile(fx, fy, dc, dr, atk) {

  // ---- Entity makers ----

    return m.make(type, c, r);

  function findFreeCell(occ, room, tries) {

    for (var t = 0; t < tries; t++) {
      var tc = room.c + randi(1, room.w - 2);
      var tr = room.r + randi(1, room.h - 2);

// Строит маску принадлежности стен к комнатам:
// стены по периметру комнаты получают id этой комнаты.
function buildRoomMask(rooms) {
    var mapH = env.cfg.mapH, mapW = env.cfg.mapW;
    var mask = [];
    for (var y = 0; y < mapH; y++) { mask[y] = []; for (var x = 0; x < mapW; x++) mask[y][x] = -1; }

    for (var ri = 0; ri < rooms.length; ri++) {
        var rm = rooms[ri];
        // Периметр комнаты — строки/столбцы вокруг FLOOR-прямоугольника
        for (var y = rm.r - 1; y <= rm.r + rm.h; y++) {
            for (var x = rm.c - 1; x <= rm.c + rm.w; x++) {
                if (y < 0 || y >= mapH || x < 0 || x >= mapW) continue;
                var t = env.map[y] && env.map[y][x];
                if (t && t.type === 'WALL') {
                    // Назначаем только если ещё не принадлежит другой комнате
                    if (mask[y][x] === -1) mask[y][x] = ri;
                }
            }
        }
    }
    return mask;
}



function isFloor(y, x) {
    var t = env.map[y] && env.map[y][x];
    return t && (t.type === 'FLOOR' || t.type === 'DOOR');
}

function assignSpriteTypes(rooms) {
    var mapH = env.cfg.mapH, mapW = env.cfg.mapW;


    function getWallSpriteType(y, x) {
        var floorUp        = isFloor(y - 1, x);
        var floorDown      = isFloor(y + 1, x);
        var floorLeft      = isFloor(y, x - 1);
        var floorRight     = isFloor(y, x + 1);
        var floorDownRight = isFloor(y + 1, x + 1);
        var floorDownLeft  = isFloor(y + 1, x - 1);
        var floorUpRight   = isFloor(y - 1, x + 1);
        var floorUpLeft    = isFloor(y - 1, x - 1);

        // Углы — только диагональный пол, без прямых соседей-полов
        if (!floorUp && !floorDown && !floorLeft && !floorRight) {
            if (floorDownRight) return 'wall_up_corner_a_left';  // ┌
            if (floorDownLeft)  return 'wall_up_corner_a';       // ┐
            if (floorUpRight)   return 'wall_down_corner_b_left'; // └
            if (floorUpLeft)    return 'wall_down_corner_b';      // ┘
            return 'wall_dot';
        }
        
        function checkExitHoriz(up) { /// ----------
        
            // доп. проверка наличия выходов рядом со стеной
            if (floorLeft) return 'wall_dot';  
            if (floorRight) return 'wall_dot';
            
            if (up) {
            
                var custom_hup = ['b', 'c','d','e', 'b', 'c','d','e', 'b', 'c','d','e'];
                
                if ((y+x)%2===0) return 'wall_h_up_' + custom_hup[randi(0, custom_hup.length-1)];
                else return 'wall_h_up_a';
                
            } else 
            
            return Math.random() < 0.5 ? 'wall_h_bottom_a' : 'wall_h_bottom_b';
        }
  
        function checkExitVert(left) { // /\/\/\
        
            // доп. проверка наличия выходов рядом со стеной
            if (floorUp) return 'wall_dot';  
            if (floorDown) return 'wall_dot';
            
            if (left) 
            return Math.random() < 0.8 ? 'wall_v_a_left' : 'wall_v_b_left';
            else 
            return Math.random() < 0.5 ? 'wall_v_a' : 'wall_v_b';
        }
        
        // Горизонтальные стены
        if (floorDown && !floorUp) // на клетку ниже есть пол и нет пола сверху - это верхняя часть комнаты
            return checkExitHoriz(true);
        if (floorUp && !floorDown)  // нижняя
            return checkExitHoriz(false);

        // Вертикальные стены
        if (floorRight && !floorLeft)
            return checkExitVert(true);
        if (floorLeft && !floorRight)
            return checkExitVert(false);
        
        
        return 'wall_dot';
    }

    // Назначаем sprite_type всем стенам универсально
    for (var y = 0; y < mapH; y++) {
        for (var x = 0; x < mapW; x++) {
            var t = env.map[y] && env.map[y][x];
            
            if (!t) continue;
            
            if (t.type === 'WALL') {
                t.sprite_type = getWallSpriteType(y, x);
            } else if (t.type === 'FLOOR' || t.type === 'DOOR') {
            
                var type = (y+x)%2===0 ? 1 : 2;
                var subtype = 0;
                if (type == 1) {
                    subtype = (randi(1, 2 * 100) % 2) + 1;
                } else {
                    subtype = (randi(1, 3 * 100) % 3) + 1;
                }
                t.sprite_flip_v = randi(0, 1) == 1 ? true : false ; 
                t.sprite_flip_h = randi(0, 1) == 1 ? true : false ;
                t.sprite_type = 'floor_' + (type == 1 ? 'a' : 'b') + '_' + subtype;
            }
        }
    }
    
    function isValidWall(y, x) {

        var t2 = env.map[y] && env.map[y][x];
        if (!t2) return false;
        if (t2.type !== 'WALL') return false;
        if (t2.sprite_type=='wall_dot') return false;
        return true;
    }
    
    for (var y = 0; y < mapH; y++) {
        for (var x = 0; x < mapW; x++) {
            var t = env.map[y] && env.map[y][x];
            
            if (!t) continue;
            var floorUp        = isFloor(y - 1, x);
            var floorDown      = isFloor(y + 1, x);
                
            if (t.type === 'WALL' && t.sprite_type == 'wall_dot') {
            
                if (floorUp && !floorDown && isFloor(y, x + 1) && isValidWall(y+1, x) && isValidWall(y, x-1)) {
                   
                    t.sprite_type = 'wall_down_corner_a';
                    continue;
                }
                
                if (floorUp && !floorDown && isFloor(y, x - 1) && isValidWall(y+1, x) && isValidWall(y, x+1)) {
                   
                    t.sprite_type = 'wall_down_corner_a_right';
                    continue;
                }
            } 
        }
    } 
   
}

function checkNearMapByType(dx, dy, validType, inValid, range) {
    for (var ny = dy - range; ny <= dy + range; ny++) {
        for (var nx = dx - range; nx <= dx + range; nx++) {
            if (nx === dx && ny === dy) continue;
            var nt = env.map[ny] && env.map[ny][nx];
           
            if (inValid) { 
                if (!nt) continue;
                if (nt.type === validType) return false;
            } else {
                if (!nt || nt.type !== validType) return false;
            }
        }
    }
    
    return true;
}

// ---- Размещение одиночных (dot) стен внутри комнат ----
function placeDotWalls(rooms) {
    var mapH = env.cfg.mapH, mapW = env.cfg.mapW;

    for (var ri = 0; ri < rooms.length; ri++) {
        var rm = rooms[ri];
        // Внутренняя площадь комнаты (без стен по периметру)
        var innerW = rm.w - 2, innerH = rm.h - 2;
        if (innerW < 3 || innerH < 3) continue; // слишком мало места

        var count = randi(0, 2); // 0–2 dot стены на комнату
        var placed = 0, tries = 0;

        while (placed < count && tries < 40) {
            tries++;
            var dx = rm.c + 1 + randi(0, innerW - 1);
            var dy = rm.r + 1 + randi(0, innerH - 1);
            
            if (!checkNearMapByType(dx, dy, 'FLOOR', false, 1)) continue;
            
            // Ставим dot-стену
            env.map[dy][dx] = env.makeTile('WALL');
            env.map[dy][dx].wall_type = 'DOT';
            env.map[dy][dx].sprite_type = 'wall_dot';
            env.map[dy][dx].isDotWall = true; // метка для спауна мобов
            placed++;
        }
    }
}

// Убирает стены, не граничащие ни с одним проходимым тайлом (FLOOR/STAIRS/DOOR).
function pruneVoidWalls() {
    var mapW = env.cfg.mapW, mapH = env.cfg.mapH;

    // Проверяет, является ли тайл (tx,ty) "живым" (floor/stairs/door)
    function isPassable(tx, ty) {
        if (tx < 0 || ty < 0 || tx >= mapW || ty >= mapH) return false;
        var t = env.map[ty] && env.map[ty][tx];
        if (!t) return false;
        return t.type === 'FLOOR' || t.type === 'STAIRS' || t.type === 'DOOR';
    }

    for (var y = 0; y < mapH; y++) {
        for (var x = 0; x < mapW; x++) {
            var tile = env.map[y][x];
            if (!tile || tile.type !== 'WALL') continue;

            // Проверяем все 8 соседей (включая диагонали — для красивых углов)
            var hasNeighbour = false;
            for (var dy = -1; dy <= 1 && !hasNeighbour; dy++) {
                for (var dx = -1; dx <= 1 && !hasNeighbour; dx++) {
                    if (dx === 0 && dy === 0) continue;
                    if (isPassable(x + dx, y + dy)) hasNeighbour = true;
                }
            }

            if (!hasNeighbour) env.map[y][x] = null; // → void
        }
    }
}

function placeDoor(x, y, roomFrom, roomTo) {

    var tile = env.map[y][x];
    if (!tile) return false;
    
    if (!checkNearMapByType(x, y, 'DOOR', true, 1)) return false;
            
    var tL = env.map[y][x-1], tR = env.map[y][x+1];
    var tU = env.map[y-1][x], tD = env.map[y+1][x];

    var wU = tU && tU.type === 'WALL';
    var wD = tD && tD.type === 'WALL';
    var wL = tL && tL.type === 'WALL';
    var wR = tR && tR.type === 'WALL';

    var key = x + ',' + y;
    var dir = null;

    if (wU && wD) {
        dir = 'H'; // положение самой двери - стены Vertical
    } else if (wL && wR) {
        dir = 'V'; // положение самой двери - стены Horizontal
    }
    
    
            
    if (dir && tile.type !== 'DOOR') {
    
        
        tile.type = 'DOOR';
        
        tile.door = makeItem('door', x, y);
        if (y < roomFrom.r && dir == 'V') tile.door.door_side = 'up';
        if (y > roomFrom.r && dir == 'V') tile.door.door_side = 'down';
        if (x < roomFrom.c && dir == 'H') tile.door.door_side = 'left';
        if (x > roomFrom.c && dir == 'H') tile.door.door_side = 'right';
         
        tile.door.roomFrom = roomFrom;
        tile.door.door_dir = dir; 
        tile.door.door_open = false;
        tile.door.isDoor = true;
        env.entities.push(tile.door); 
        return true;
    }
    
    return false;
}


// ============================================================
//  TORCH — факел на стене комнаты
// ============================================================
function Torch(env, wx, wy, wallSide) {
    this.x = wx;
    this.y = wy;
    this.c = Math.max(0,Math.floor((wx /env.TILE)-1));
    this.r = Math.max(0,Math.floor((wy /env.TILE)-1));
    this.active = false;
    this.side = wallSide; // 'top'|'bottom'|'left'|'right'
    this.time = Math.random() * Math.PI * 2; // случайная фаза
    this.emitTimer = 0;
    this.emitRate = 0.045; // секунд между частицами
}

Torch.prototype.update = function(dt) {

    this.active = false;
   var d = mdist(this.c, this.r, env.player.c, env.player.r);

    if (d > 10) return;
    this.active = true;
    this.time += dt * (0.3 + 0.4 * Math.sin(this.time * 1.7));
    this.emitTimer -= dt;
    if (this.emitTimer <= 0) {
        this.emitTimer = this.emitRate + Math.random() * 0.02;
        this._emit();
    }
};

Torch.prototype._emit = function() {
    var T = env.TILE;
    // Смещение эмиттера от центра тайла в сторону стены
    var ex = this.x, ey = this.y;
    // Базовая скорость вверх с небольшим боковым дрейфом
    var vx = rand(-12, 12);
    var vy = rand(-70, -30);
    
    var offsetY = -10; //this.side
    var offsetX = 0;
    if (this.side == 'left') {
        offsetX = 6;
    } else if (this.side == 'right') {
        offsetX = -6;
    }
    
    // Основное пламя (оранжево-жёлтое)
    var flameColors = ['#ff8800','#ffaa00','#ffcc22','#ff6600'];
    var col = flameColors[randi(0, flameColors.length-1)];
    env.spawnParticle(offsetX + ex + rand(-3,3), offsetY + ey, vx, vy, rand(0.25, 0.55), col, rand(2.5, 5));

    // Красный росчерк в основании
    if (Math.random() < 0.2) {
        env.spawnParticle(offsetX + ex + rand(-2,2), offsetY + ey + rand(0,4), vx * 0.5, vy * 0.4, rand(0.12, 0.4), '#cc3300', rand(1.5, 3));
    }
    // Белый кончик
    if (Math.random() < 0.25) {
        env.spawnParticle(offsetX + ex + rand(-1,1),  offsetY + ey - 2, vx * 0.3, vy * 1.2, rand(0.1, 0.2), '#ffffcc', rand(1, 2.5));
    }
};

Torch.prototype.draw = function(ctx, glow) {
    if (!this.active) return;
    
    if (glow) {
    var T = env.TILE * 2;
    // Пульсирующее свечение — плавный синус по времени
    var glow = 0.32 + 0.18 * Math.sin(this.time * 3.1) + 0.08 * Math.sin(this.time * 5.7);
    var radius = T * (1.1 + 0.35 * Math.sin(this.time * 2.3));

    var grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, radius);
        grad.addColorStop(0,   'rgba(255,160,30,' + (glow * 0.9).toFixed(3) + ')');
        grad.addColorStop(0.35,'rgba(255,100,10,' + (glow * 0.55).toFixed(3) + ')');
        grad.addColorStop(0.7, 'rgba(200,60,0,'   + (glow * 0.2).toFixed(3) + ')');
        grad.addColorStop(1,   'rgba(0,0,0,0)');

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
    
    } else {
    
        if (this.side == 'bottom') return;
        
        if (this.side == 'top') env.drawSpr(ctx, 'light_h', this.x, this.y, 1); // env.drawSprTransform(ctx, h.origin.sk, 0, 0, false, true, true);
        else if (this.side == 'left') {
            env.drawSprTransform(ctx, 'light_v', this.x, this.y, true, false, false);
        } else if (this.side == 'right') {
            env.drawSpr(ctx, 'light_v', this.x, this.y, 1);
        }
                
        // только сам факел
    }
    
};

// simplified findFreeCell with fallback pos
function getFreeCell(occ, room, startC, startR, nullOnFail) {
    
    if (typeof startC == 'undefine' || !startC) {startC = room.cx; startR = room.cx;}; 

    for (var ta = 0; ta < 30; ta++) {
    
        var nc2 = room.c + randi(1, room.w-2);
        var nr3 = room.r + randi(1, room.h-2);
        var dist = mdist(nc2, nr3, startC, startR);
 
        if (dist >= 2 && dist <= 4 && isFree(occ, nc2, nr3)) {
            occupy(occ, nc2, nr3); 
            return {c : nc2, r : nr3};
            break;
        }
    }
    
    occupy(occ, startC, startR); 
    return nullOnFail ? null : {c : startC, r : startR};
}

// ---- Размещение факелов на стенах комнат ----
function placeTorches(rooms) {
    var T = env.TILE;
    for (var ri = 0; ri < rooms.length; ri++) {
        var rm = rooms[ri];
        var count = randi(2, 3);
        var sides = ['top','left','right']; // bottom
        shuffleArr(sides);
        var placed = 0;
        
        function isWalidWall(wallRow, wallCol) {
            var t = env.map[wallRow] && env.map[wallRow][wallCol];
            if (!t || t.type !== 'WALL') return false;
            if (t.sprite_type == 'wall_h_up_b') return false;
            
            return true;
        }
        
        for (var si = 0; si < sides.length && placed < count; si++) {
            var side = sides[si];
            var wx, wy, wallRow, wallCol;

            if (side === 'top') {
                wallRow = rm.r - 1;
                // выбираем случайный столбец внутри комнаты (не угол)
                wallCol = rm.c + randi(1, rm.w - 2);
                if (!isWalidWall(wallRow, wallCol)) continue;
                wx = wallCol * T + T / 2;
                wy = wallRow * T + T * 0.72;
                wy -= 10;
            } else if (side === 'bottom') {
                wallRow = rm.r + rm.h;
                wallCol = rm.c + randi(1, rm.w - 2);
                if (!isWalidWall(wallRow, wallCol)) continue;
                wx = wallCol * T + T / 2;
                wy = wallRow * T + T * 0.3;
            } else if (side === 'left') {
                wallCol = rm.c - 1;
                wallRow = rm.r + randi(1, rm.h - 2);
                if (!isWalidWall(wallRow, wallCol)) continue;
                wx = wallCol * T + T * 0.72;
                wx += 20;
                wy = wallRow * T + T / 2;
            } else { // right
                wallCol = rm.c + rm.w;
                wallRow = rm.r + randi(1, rm.h - 2);
                if (!isWalidWall(wallRow, wallCol)) continue;
                wx = wallCol * T + T * 0.3;
                wx -= 20;
                wy = wallRow * T + T / 2;
            }

            env.torches.push(new Torch(env, wx, wy, side));
            placed++;
        }
    }
    
}

function placeStaticProps(occ, room) {
    if (Math.random()<0.7) {
        var cell3=findFreeCell(occ,room,15);
        if (cell3) { 
            var itemsNum = 2;
            
            var staticType = Math.ceil(randi(1, 100 * itemsNum) / 100);
            var itemKey = 'box';
            if (staticType == 1) itemKey = 'box';
            if (staticType == 2) itemKey = 'barel';
            
            env.entities.push(makeItem(itemKey, cell3.c, cell3.r)); 
            occupy(occ,cell3.c,cell3.r); 
           
            var additionItemsMax = randi(0, 2);
            if (additionItemsMax > 0)
            for (var b=0; b<additionItemsMax; b++) {
                var offsetX=randi(0, 2);
                var offsetY=randi(0, 2);
                if (offsetX == 0 && offsetY == 0) continue;
                cell3.c += offsetX; 
                cell3.r += offsetY;
                //var rndDir = dirs[randi(0, dirs.length-1)];
                //cell3.c += rndDir.dc;
                //cell3.r += rndDir.dr;
                if (isFree(occ, cell3.c, cell3.r)) {
                    env.entities.push(makeItem(itemKey, cell3.c, cell3.r)); 
                     occupy(occ,cell3.c,cell3.r);
                } else break;
            }
        }
    }
}
    
function generate() {
    resetKeys();

    env.cfg.mapW = 36; env.cfg.mapH = 36;
    env.modal = null; env.canvasButtons = []; env.annotations = [];
    env.fairies = [];
    dlg.close();

    var mapW = env.cfg.mapW, mapH = env.cfg.mapH;

    // Init map — all WALLs (object tiles)
    env.map = [];
    for (var r = 0; r < mapH; r++) {
        env.map[r] = [];
        for (var c = 0; c < mapW; c++) env.map[r][c] = env.makeTile('WALL');
    }

      // Place rooms
    var rooms = [];
    var roomPadding = 3; // отступ между комнатами (в клетках)

    for (var att = 0; att < 60; att++) {
        var rw = randi(4,9), rh = randi(3,7);
        var rc = randi(1, mapW-rw-1), rr = randi(1, mapH-rh-1);
        var ok = true;

        for (var ri = 0; ri < rooms.length; ri++) {
            var ro = rooms[ri];

            if (rc <= ro.c + ro.w + roomPadding &&
                rc + rw >= ro.c - roomPadding &&
                rr <= ro.r + ro.h + roomPadding &&
                rr + rh >= ro.r - roomPadding) {
                ok = false;
                break;
            }
        }

        if (!ok) continue;

        for (var ry = rr; ry < rr + rh; ry++)
            for (var rx = rc; rx < rc + rw; rx++)
                env.map[ry][rx] = env.makeTile('FLOOR');

        rooms.push({
            c: rc, r: rr, w: rw, h: rh,
            cx: rc + Math.floor(rw/2),
            cr: rr + Math.floor(rh/2)
        });
    }

    // Connect rooms using MST (nearest-neighbor), tunnels keep 1-tile gap from other rooms
    // Returns true if point (tx,ty) is inside or on the border of a room (excluding rA and rB)
    function tunnelTooClose(tx, ty, rA, rB) {
        for (var ri = 0; ri < rooms.length; ri++) {
            var ro = rooms[ri];
            if (ro === rA || ro === rB) continue;
            // 1-tile buffer around room perimeter
            if (tx >= ro.c - 1 && tx <= ro.c + ro.w &&
                ty >= ro.r - 1 && ty <= ro.r + ro.h) return true;
        }
        return false;
    }

    function carveCorridor(rA, rB) {
        var x = rA.cx, y = rA.cr;
        var tx = rB.cx, ty = rB.cr;

        while (x !== tx) {
            // Всегда прорезаем, если близко к цели ИЛИ не мешает другим комнатам
            if (!tunnelTooClose(x, y, rA, rB) || Math.abs(x - tx) <= 3)
                env.map[y][x] = env.makeTile('FLOOR');
            x += x < tx ? 1 : -1;
        }

        while (y !== ty) {
            if (!tunnelTooClose(x, y, rA, rB) || Math.abs(y - ty) <= 3)
                env.map[y][x] = env.makeTile('FLOOR');
            y += y < ty ? 1 : -1;
        }

        // Гарантируем точку поворота и финальную точку
        env.map[rA.cr][tx] = env.makeTile('FLOOR'); // точка поворота (угол)
        env.map[ty][tx] = env.makeTile('FLOOR');     // конечная точка
    }

    // Build MST: connect each room to its nearest already-connected room
    var connected = [rooms[0]];
    var unconnected = rooms.slice(1);
    var corridorPairs = [];
    while (unconnected.length > 0) {
        var bestDist = Infinity, bestI = 0, bestJ = 0;
        for (var i = 0; i < unconnected.length; i++) {
            for (var j = 0; j < connected.length; j++) {
                var dx = unconnected[i].cx - connected[j].cx;
                var dy = unconnected[i].cr - connected[j].cr;
                var d = dx*dx + dy*dy;
                if (d < bestDist) { bestDist = d; bestI = i; bestJ = j; }
            }
        }
        var rA = connected[bestJ], rB = unconnected[bestI];
        corridorPairs.push([rA, rB]);
        carveCorridor(rA, rB);
        connected.push(rB);
        unconnected.splice(bestI, 1);
    }
    
    env.entities=[];

    // Place doors along corridor paths
    for (var pi = 0; pi < corridorPairs.length; pi++) {
        var A = corridorPairs[pi][0], B = corridorPairs[pi][1];
        var x = A.cx, y = A.cr;
        var doorPlaced = false;
        while (x !== B.cx) {
            if (!doorPlaced) doorPlaced = placeDoor(x, y, A, B);
            else break;
            x += x < B.cx ? 1 : -1;
        }
        while (y !== B.cr) {
            if (!doorPlaced) doorPlaced = placeDoor(x, y, A, B);
            else break;
            y += y < B.cr ? 1 : -1;
        }
    }

    // Stairs in last room
    var stairC=-1, stairR=-1;
    if (rooms.length > 1) {
        var lr = rooms[rooms.length-1];
        stairC=lr.cx; stairR=lr.cr;
        env.setTileStairs(stairC, stairR);
    }
    env.torches=[];
    // Убрать лишние стены (те, что не граничат ни с одним floor/stairs/door)
    pruneVoidWalls();

    // Dot-стены внутри комнат (до fixAllWalls, чтобы они тоже попали в расчёт)
    placeDotWalls(rooms);


    // Назначить sprite_type каждой стене
    assignSpriteTypes(rooms);

    // ---- Разместить факелы на стенах комнат ----
    placeTorches(rooms);
    
    // ---- Player setup ----
     env.particles=[]; env.dmgNums=[]; env.projectiles=[];
    var sr = rooms[0]||{cx:2,cr:2};
    // Build occupied map
    var occ={};
    

    if (!env.player) {
        var p = new Player(env);
        var cell = getFreeCell(occ, rooms[0], rooms[0].cx, rooms[0].cr);
        env.player = p.make(cell.c, cell.r);
        if (env.globalState.playerStats) {
            var s = env.globalState.playerStats;
            env.player.hp=s.hp; env.player.maxHp=s.maxHp;
            env.player.atk=s.atk; env.player.def=s.def;
            env.player.xp=s.xp; env.player.xpNext=s.xpNext;
            env.player.level=s.level; env.player.gold=s.gold;
            env.player.weapon=s.weapon; env.player.weapons=s.weapons.slice();
            env.player.arrows=s.arrows; env.player.stamina=s.stamina;
            env.player.maxStamina=s.maxStamina; env.player.statPoints=s.statPoints;
            env.player.mana=s.mana||60; env.player.maxMana=s.maxMana||60;
            env.player.items=s.items.map(function(x){return{kind:x.kind};});
            env.player.fairyKeys={};
            env.globalState.playerStats=null;
        }
    } else {
        var pl=env.player;
        var cell = getFreeCell(occ, rooms[0], rooms[0].cx, rooms[0].cr);
        pl.c = cell.c; pl.r = cell.r;
        pl.x=pl.c*env.TILE+env.TILE/2; pl.y=pl.r*env.TILE+env.TILE/2;
        pl.hp=Math.min(pl.maxHp, pl.hp+4);
        pl.fairyKeys={};
    }

    if (stairC>=0) occupy(occ, stairC, stairR);

    // ---- NPC (floor 1) ----
    if (floorNum===1 && rooms.length>0) {
        var cell = getFreeCell(occ, rooms[0], env.player.c+1, env.player.r);
        env.entities.push(makeNpc('mentor', cell.c, cell.r));
    }

    // ---- Fairies ----
    var fairyMinFloor={0:1,1:2,2:4};
    var unrescuedFairies=[];
    for (var fi=0;fi<CDEFS.length;fi++) {
        var fdef=CDEFS[fi];
        if (!env.globalState.rescuedFairies[fdef.id]&&floorNum>=(fairyMinFloor[fi]||1))
            unrescuedFairies.push(fdef);
    }
    shuffleArr(unrescuedFairies);
    var activeFairyDef=unrescuedFairies.length>0?[unrescuedFairies[0]]:[];
    var activeFairyId=activeFairyDef.length>0?activeFairyDef[0].id:null;

    placeStaticProps(occ, rooms[0]);
    
    for (var i = 0; i < rooms.length; i++) {
        var room = rooms[i];
        var corners = [
            {c : room.c, r : room.r, side : 'up_left', ox : -4, oy : -4}, 
            {c : room.c + room.w - 1, r : room.r, side : 'up_right', ox : 4, oy : -4}, 
            {c : room.c, r : room.r + room.h-1, side : 'bottom_left', ox : -4, oy : 4}, 
            {c : room.c + room.w - 1, r : room.r + room.h-1, side : 'bottom_right', ox : 4, oy : 4}
        ];
            
        for (var b = 0; b < 4; b++) {
            if (randi(1, 100) < 50 && isFree) {
                var web = makeItem('web_light',corners[b].c, corners[b].r);
                web.side = corners[b].side;
                web.flip_h = corners[b].side.indexOf('bottom') !== -1;
                web.flip_v = corners[b].side.indexOf('left') !== -1;
                web.ox = corners[b].ox;
                web.oy = corners[b].oy;
                web.isPickable = false;
                env.entities.push(web);
            }
        }
        
    }
    
    
    // ---- Monsters & items ----
    var mTypes=Object.keys(MDEFS);
    for (var i=1;i<rooms.length;i++) {
        var room=rooms[i], cnt=randi(1,3+(floorNum>2?2:0));
        if (i===rooms.length-1) {
            var bmt='boss';
            if(floorNum<=1) bmt='skeleton'; else if(floorNum<=2) bmt='spider';
            var bossCell=findFreeCell(occ,room,20);
            if (bossCell) {
                var boss=makeMonster(bmt,bossCell.c,bossCell.r);
                if (activeFairyId) boss.keyDrop='key_'+activeFairyId;
                env.entities.push(boss); occupy(occ,bossCell.c,bossCell.r);
            }
        }
        for (var k=0;k<cnt;k++) {
            var cell2=findFreeCell(occ,room,15); if (!cell2) continue;
            var mt=mTypes[0];
            if(floorNum===1){if(randi(0,100)>80)mt=mTypes[1];}
            else mt=mTypes[randi(0,Math.min(mTypes.length-2,floorNum))];
            env.entities.push(makeMonster(mt,cell2.c,cell2.r));
            occupy(occ,cell2.c,cell2.r);
        }
        
        placeStaticProps(occ, room);
        
        if (Math.random()<0.4) {
            var cell3=findFreeCell(occ,room,15);
            if (cell3) { env.entities.push(makeChest(cell3.c,cell3.r)); occupy(occ,cell3.c,cell3.r); }
        }
        if (i===1&&Math.random()<0.6&&!(env.player.weapons||[]).includes('bow')) {
            var cell5=findFreeCell(occ,room,15);
            if (cell5) env.entities.push(makeItem('bow',cell5.c,cell5.r));
        }
        if (i===2&&Math.random()<0.5&&!(env.player.weapons||[]).includes('staff')) {
            var cellSt=findFreeCell(occ,room,15);
            if (cellSt) env.entities.push(makeItem('staff',cellSt.c,cellSt.r));
        }
    }

    // ---- Fairy cage ----
    if (activeFairyId) {
        var cageRooms=rooms.slice(Math.max(1,rooms.length-3));
        var placed2=false;
        for (var cri=0;cri<cageRooms.length&&!placed2;cri++) {
            var crm=cageRooms[cri];
            var cc3=findFreeCell(occ,crm,20);
            if (cc3) { env.entities.push(makeCage(activeFairyId,cc3.c,cc3.r)); occupy(occ,cc3.c,cc3.r); placed2=true; }
        }
    }

    centerCamera();
    env.gameOver=false;
    env.addLog('Этаж '+floorNum+' — добро пожаловать!','info');
    env.player.blockingMove(0,0);
}

  function savePlayerStats() {

    var pl = env.player;
    env.globalState.playerStats = {
      hp: pl.maxHp, maxHp: pl.maxHp,
      atk: pl.atk, def: pl.def,
      xp: pl.xp, xpNext: pl.xpNext,

      mana: pl.mana, maxMana: pl.maxMana,
      items: (pl.items || []).map(function(x){return {kind:x.kind};})
    };
  }

  // Restart: same floor, but player dies and returns — keep stats, reset floor
  function restart() {
    savePlayerStats();
    env.player = null;
    // floorNum stays the same
    generate();
  }

  // New game: reset everything
  function newGame() {
    floorNum = 1;
    env.player = null;
    env.globalState = { rescuedFairies: {}, playerStats: null };
    generate();
  }

  // ---- Item drop from mob ----
  env.dropItemFromMob = function(type, mob) {
    if (!IDEFS[type]||!env.player) return;
    var cells=[];
    for(var i=0;i<dirs.length;i++){
      var d={c:mob.c+dirs[i].dc,r:mob.r+dirs[i].dr};
      if(env.player.c===d.c&&env.player.r===d.r) continue;
      cells.push(d);
    }
    var valid=cells.filter(function(cell){return !env.isWall(cell.c,cell.r);});
    var to=valid.length>0?valid[randi(0,valid.length-1)]:{c:mob.c,r:mob.r};
    var it=makeItem(type,to.c,to.r);
    
    
    var tx=to.c*env.TILE+env.TILE/2, ty=to.r*env.TILE+env.TILE/2;
    it.x=mob.x; it.y=mob.y;
    it.fly={sx:mob.x,sy:mob.y,tx:tx,ty:ty,t:0,dur:0.35};
    env.entities.push(it);
    
    return it;
  };

    if(!env.player||env.gameOver||env.modal||dlg.active) return false;
    return env.player.attack(dc, dr);

  function startNpcDialogue(npc) {
    var script = NPC_SCRIPTS[npc.npcId] || NPC_SCRIPTS['mentor'];
    var startIdx = (npc.npcId === 'mentor' && npc.dialogSeen) ? 1 : 0;
    dlg.start(npc, script, startIdx);
    npc.dialogSeen = true;
    env.addLog('Говоришь с ' + npc.name, 'info');
  }

  function tryUseStairs(){
    if(!env.player||env.gameOver||env.modal||dlg.active) return false;
    var pl=env.player;
    // todo - check fairys and let choose floor
    if(env.map[pl.r]&&env.isStairs(pl.c, pl.r)) {
        env.addLog('▼ Этаж '+(floorNum+1),'info');
        floorNum++;
        generate();
        return true;
    }
    return false;
  }

  function tryInteractOrAttack(){
  
    if(dlg.active){ dlg.onConfirm(); return; }
    if(env.modal==='inventory'){closeModal();return;}
    if(env.modal) return;
    // Ranged aiming: E/Space fires
    if(env.player && env.player.bowAiming){ env.player.rangedShoot(); return; }
    
    if(tryUseStairs()) return;
    
    var dc=env.player.lastDc, dr=env.player.lastDr;
    if(dc===0&&dr===0){dc=1;dr=0;}
    // Staff uses F not E; melee for sword
    if (tryMelee(dc,dr,true)) return;
    
    
    
    if (tryDialog(env.player.c + dc, env.player.r + dr, true)) return;
    if (tryOpenProp(env.player.c, env.player.r, dc, dr)) return;

    // Check for destructable items in target cell
    if (env.player.attackEnv(env.player.c,  env.player.r, dc, dr)) return;
    
    if (env.player.isRangedWeapon && env.player.isRangedWeapon()) {
        env.player.enterAim();
        env.player.rangedShoot();
        
    } else {
    
        env.player.whiff(dc, dr);
    }
  }

  function tryDialog(nc, nr, byDist) {
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(e.isNpc){
        var near = false;
        if (byDist) {
          near = mdist(e.c, e.r, nc, nr) === 0;
          
        } else {
          near = (e.c===nc && e.r===nr) && e.blocking === 1;
        }
        if (!near) continue;
        startNpcDialogue(e);
        return true;
      }
    }
    return false;
  }


  function quickEquipWeapon(slot) {
    if(!env.player||env.gameOver||env.modal||dlg.active) return false;
    env.player.equipWeapon(slot);
    return true;
  }

  function quickUsePotion() {
    if(!env.player||env.gameOver||env.modal||dlg.active) return false;
    env.player.usePotion();
    return true;
  }
  
  function tryOpenProp(nc, nr, dc, dr) {
    nc += dc;
    nr += dr;
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      
      if ((!e.isChest && !e.isCage && !e.isDoor) || e.broken) continue;
      
      
      //var near = mdist(e.c, e.r, nc, nr) === 1;
      //if (!near) continue;
      if (e.c != nc || e.r != nr) continue; 
      
      var breakProp = false;
      if (e.isChest) {
      
          if (!e.opened) {
            openChest(e);
          } else {
            breakProp = true;
          }
          
      } else if (e.isCage) {
      
        if (!e.freed) {
            e.releaseFairy();
        } else {
            breakProp = true;
        }
      } else if (e.isDoor) {
        
        if (!e.door_open) {
            e.door_open = true;
            e.isBlocking = false;
            console.log(e.door_dir, e.door_side);
            env.addLog('Дверь открыта', 'info');
            
            return true;
        }
        
        continue;
      }
      
      if (breakProp) {
      
        e.broken = true;
        env.spawnFairyFX(e.x, e.y, '#996633');
        return false;
        
      } else {
        return true;
      }
      
    }
    return false;
  }

  function tryMove(dc, dr){
    if(!env.player||env.gameOver||env.modal||dlg.active) return;
    var pl=env.player;

    pl.lastDc=dc; pl.lastDr=dr;
    var oldFacing=pl.facing;
    if(dc!==0) pl.facing=dc>0?-1:1;
    var nc=pl.c+dc, nr=pl.r+dr;
    if(nr<0||nr>=env.cfg.mapH||nc<0||nc>=env.cfg.mapW) return;
    if(tryMelee(dc,dr,false)) return;
    if(env.isWall(nc,nr)) return env.player.blockingMove(0, 0);// pl.blockingMove(dc, dr);
    if(oldFacing!==pl.facing) return;
    if (tryDialog(nc, nr, false)) return;

    pl.c=nc; pl.r=nr; pl.moveHop=1;
    if (pl.isStuck) pl.isStuck = false; // moved out of stuck position
    
    for(var i=env.entities.length-1; i>=0; i--){
      var e = env.entities[i];
      if(e.isItem && e.c===nc && e.r===nr) {
        if (e.pickup()) env.entities.splice(i, 1);
      }
    }
  

  }


  function tryShoot(){
    if(!env.player||env.gameOver||env.modal||dlg.active) return;
    var pl = env.player;
    if (pl.weapon === 'bow' || pl.weapon === 'staff') {
       if (pl.bowAiming) env.player.rangedShoot();
       else pl.enterAim();
    } else {
    
      env.addLog('Экипируй лук или посох [I]','info');
    }
  }
  
  function openChest(chest){
    chest.opened=true;
    env.spawnFairyFX(chest.x,chest.y,'#d4a830');
    var r=Math.random();
    
    if(r<0.35){env.dropItemFromMob('arrows',chest);}
    else if(r<0.78){env.dropItemFromMob('potion',chest);}
    else if(r<0.78){env.dropItemFromMob('gold',chest).valLocal = randi(1,4); }
    else env.dropItemFromMob('potion',chest);
  }

  // ---- Shadow helper ----
  env.drawShadow = function(ctx, unit, Z) {
    var px=unit.x, py=unit.y+env.TILE*0.26;
    ctx.save(); ctx.translate(px,py);
    var shadowW=env.TILE*0.34+(1-Z)*env.TILE*0.12;
    var shadowH=env.TILE*0.11+(1-Z)*env.TILE*0.04;
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.beginPath();
    ctx.ellipse(0,0,shadowW,shadowH,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  };

  // ---- Update ----
  var lastTime=0;
  function update(dt){
    // Main menu / controls screen - no game update
    
    
    if(env.modal==='mainmenu'||env.modal==='controls') {
        
        gameUI.update(dt);
        return;
    }

    if(paused || env.modal==='pause') return;
    dlg.update(dt);
    
    
    if( env.modalTimer > 0) env.modalTimer-= dt;

    // Ranged aiming mode: WASD/arrows tweak aiming without moving

    if(env.player && !dlg.active && !env.player.bowAiming){
      env.player.update(dt);
      moveTimer-=dt;
      if(moveTimer<=0&&!env.modal){
        var mv=false;
        if (freeCameraMode) {
          if(keys['up']){env.camera.moveCell(0,-1);mv=true;}
          else if(keys['down']){env.camera.moveCell(0,1);mv=true;}
          else if(keys['left']){env.camera.moveCell(-1,0);mv=true;}
          else if(keys['right']){env.camera.moveCell(1,0);mv=true;}
          if(mv) moveTimer=MOVE_DELAY;
        } else {
          var aimDelay = (env.player.bowAiming) ? 0.04 : MOVE_DELAY;
          // Aiming controls for ranged mode
          if(env.player.bowAiming){
            if(keys['up']){ tryMove(0,-1); mv=true; }
            else if(keys['down']){ tryMove(0,1); mv=true; }
            else if(keys['left']){ tryMove(-1,0); mv=true; }
            else if(keys['right']){ tryMove(1,0); mv=true; }
          } else {
            if(keys['up']){tryMove(0,-1);mv=true;}
            else if(keys['down']){tryMove(0,1);mv=true;}
            else if(keys['left']){tryMove(-1,0);mv=true;}
            else if(keys['right']){tryMove(1,0);mv=true;}
          }
          if(mv) moveTimer=aimDelay;
        }
      }
      if (!freeCameraMode) {
        env.camera.target.x = env.player.x;
        env.camera.target.y = env.player.y;
      }
      
      env.camera.panTo(0.05);
        
    } else if(env.player){
      env.player.update(dt);
      env.camera.panTo(0.05);
    }

    if(!dlg.active){
      for(var i=0;i<env.entities.length;i++){
        var e=env.entities[i];
        if(e.isMonster&&!e.dead) e.update(dt);
      }
    }

    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      
      if (e.isCage && !e.freed && e.fairyAnim) {
        e.fairyAnim.update(dt);
      }
      if(e.isItem&&e.fly){
        e.fly.t+=dt;
        var k=Math.min(1,e.fly.t/e.fly.dur);
        var ease=1-Math.pow(1-k,3);
        e.x=e.fly.sx+(e.fly.tx-e.fly.sx)*ease;
        e.y=e.fly.sy+(e.fly.ty-e.fly.sy)*ease;
        e.y-=Math.sin(k*Math.PI)*18;
        if(k>=1) e.fly=null;
      }
      if(e.isItem||e.isNpc) e.hopTimer=(e.hopTimer||0)+dt*(e.hopSpeed||4);
    }

    for(var i=env.particles.length-1;i>=0;i--){
      if(!env.particles[i].update(dt)) env.particles.splice(i,1);
    }
    for(var i=env.dmgNums.length-1;i>=0;i--){
      if(!env.dmgNums[i].update(dt)) env.dmgNums.splice(i,1);
    }
    for(var i=env.projectiles.length-1;i>=0;i--){
      if(!env.projectiles[i].update(dt)) env.projectiles.splice(i,1);
    }
    for(var i=env.fairies.length-1;i>=0;i--){
      if(!env.fairies[i].update(dt)) env.fairies.splice(i,1);
    }
    // Update torches
    for(var i=0;i<env.torches.length;i++) env.torches[i].update(dt);
    for(var i=env.annotations.length-1;i>=0;i--){
      env.annotations[i].life-=dt;
      if(env.annotations[i].life<=0) env.annotations.splice(i,1);
    }
    
  }

  // ---- Render ----
  function render(){
    var W=canvas.width,H=canvas.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#0a0a08';ctx.fillRect(0,0,W,H);

    // Main menu / controls - delegate to UI
    if(env.modal==='mainmenu'){
      gameUI.drawMainMenu(env.menuState.mainMenu);
      return;
    }
    if(env.modal==='controls'){
      gameUI.drawControls();
      return;
    }

    ctx.save();
    ctx.translate(W/2,H/2);
    ctx.scale(env.cfg.zoom,env.cfg.zoom);
    ctx.translate(-env.camera.x,-env.camera.y);

    env.sc=Math.max(0,Math.floor((env.camera.x-canvas.width/env.cfg.zoom/2)/env.TILE)-1);
    env.sr=Math.max(0,Math.floor((env.camera.y-canvas.height/env.cfg.zoom/2)/env.TILE)-1);
    env.ec=Math.min(env.cfg.mapW, sc+Math.ceil(canvas.width/env.cfg.zoom/env.TILE)+3);
    env.er=Math.min(env.cfg.mapH, sr+Math.ceil(canvas.height/env.cfg.zoom/env.TILE)+3);
    
    drawMap(["FLOOR", "DOOR", 'STAIRS']);
    
    drawAttackDir();
    drawShadows();

    drawMapWall();
    drawChests();
    drawCages();
    drawItems();
    
    drawMapWall(true);
    drawNpcs();

    for(var i=0;i<env.torches.length;i++) env.torches[i].draw(ctx);
    var ac = env.PLAYER_TPL.animController;
    var isAttacking = ac && ac.getAnim && ac.getAnim() === 'attack';

    if(isAttacking){
      drawMonsters();
      if(env.player&&env.player.hp>0) env.player.draw(ctx);
    } else {
      if(env.player&&env.player.hp>0) env.player.draw(ctx);
      drawMonsters();
    }

    for(var i=0;i<env.torches.length;i++) env.torches[i].draw(ctx, true);
    
    for(var i=0;i<env.fairies.length;i++) env.fairies[i].draw(ctx);
    for(var i=0;i<env.particles.length;i++) env.particles[i].draw(ctx);
    for(var i=0;i<env.dmgNums.length;i++) env.dmgNums[i].draw(ctx);
    for(var i=0;i<env.projectiles.length;i++) env.projectiles[i].draw(ctx);
    if (freeCameraMode) env.camera.drawPosCell(ctx);

    if(env.isStairs(env.player.c, env.player.r)) {
        env.drawInteractHint(env.player.c, env.player.r,
            env.player.x, env.player.y + env.TILE/2 + 16, '[E / Space] - Спустится', {checkD : 0, fontSize : 7, fromC : env.player.c, fromR : env.player.r});
    }
    
    ctx.restore();

    gameUI.drawHUD(floorNum);

    if(dlg.active) dlg.draw(ctx, W, H);
    
    if(env.modal){
      if (env.modalTimer<= 0) {
        if(env.modal==='inventory') gameUI.drawInventory(env.invPage, floorNum);
        else if(env.modal==='pause') gameUI.drawPauseMenu(env.menuState.pauseMenu);
        else if(env.modal==='win'||env.modal==='gameover') gameUI.drawWinLose(env.menuState.winLose, floorNum);
      }
    }
  }


env.drawSprTransform = function(ctx, key, x, y, flipH, flipV, rotate90, sz) {
    var s = SPRITES[key];
    if (!s || !s.img) return;
    ctx.save();
    ctx.translate(x, y);
    if (rotate90) ctx.rotate(Math.PI / 2);
    if (flipH) ctx.scale(-1, 1);
    if (flipV) ctx.scale(1, -1);
    
    if (sz === 1) {
        var sz1 = env.TILE * s.scale;
        ctx.drawImage(s.img, - sz1/2 + s.ox, - sz1/2 + s.oy, sz1, sz1);
      } else {
        var sz1 = s.img.naturalWidth * s.scale;
        var sz2 = s.img.naturalHeight * s.scale;
        ctx.drawImage(s.img, - sz1/2 + s.ox, - sz2/2 + s.oy, sz1, sz2);
      }
      
    ctx.restore();
}

// Рисует стену по sprite_type, поддерживает зеркалирование для недостающих углов
function drawWallSprite(ctx, tile, px, py) {
    var T = env.TILE;
    var cx = px + T/2, cy = py + T/2;
    var st = tile.sprite_type;

    // Маппинг sprite_type  [ключ спрайта, flipH, flipV, rotate90]
    var MAP = {
        'wall_h_up_a':      ['wall_h_up_a',      false, false, false],
        'wall_h_up_b':      ['wall_h_up_b',       false, false, false],
        'wall_h_up_c':      ['wall_h_up_c',      false, false, false],
        'wall_h_up_d':      ['wall_h_up_d',       false, false, false],
        'wall_h_up_e':      ['wall_h_up_e',       false, false, false],
        'wall_h_bottom_a':  ['wall_h_bottom_a',   false, false, false],
        'wall_h_bottom_b':  ['wall_h_bottom_b',   false, false, false],
        'wall_v_a':         ['wall_v_a',           false, false, false],
        'wall_v_b':         ['wall_v_b',           false, false, false],
        'wall_dot':         ['wall_dot',           false, false, false],
        
        
        
        'wall_up_corner_b':  ['wall_up_corner_b',           false, false, false],
        
        'wall_up_corner_b_right':  ['wall_up_corner_b',           true, false, false],
        
        'wall_down_corner_a':  ['wall_down_corner_a',           false, false, false],
        
        'wall_down_corner_c':  ['wall_down_corner_c',           false, false, true],
        
        'wall_down_corner_a_right':  ['wall_down_corner_a',           true, false, false],
        // Верхние углы
        'wall_up_corner_a': ['wall_up_corner_a',  false, false, false],  // верх-право        
        'wall_up_corner_a_left': ['wall_up_corner_a',  true, false, false],  // верх-право
        // Нижние углы — зеркалятся из верхних если нет своего спрайта
        'wall_down_corner_b': ['wall_down_corner_b', false, false, false], // низ-право
        'wall_down_corner_b_left': ['wall_down_corner_b', true, false, false], // низ-право
        'wall_v_a_left': ['wall_v_a', true, false, false], // низ-право
        'wall_v_b_left': ['wall_v_b', true, false, false], // низ-право
    };

    var entry = MAP[st];
    if (!entry) {
        // Fallback: рисуем wall_h_up_a
        entry = ['wall_dot', false, false, false];
    }

    var sprKey = entry[0];
    var spr = SPRITES[sprKey];

    if (spr && spr.img) {
        drawSprTransform(ctx, sprKey, cx, cy, entry[1], entry[2], entry[3]);
    } else {
        console.log('unmapped' + st);
    }
}


function drawMapWall(corners_bottom) {
    
    for (var r=env.sr; r<env.er; r++) {
        for (var c=env.sc; c<env.ec; c++) {
            var tile = env.map[r] && env.map[r][c];
            if (!tile) continue; // VOID — пустота, просто фон

            if (tile.type === 'WALL') {
                if (corners_bottom && tile.sprite_type.indexOf('down_corner') == -1) {
                    continue;
                }
                drawWallSprite(ctx, tile, c * env.TILE, r * env.TILE);
            }
        }
    }
}

function drawMap(type) {
    
    
    for (var r=env.sr; r<env.er; r++) {
        for (var c=env.sc; c<env.ec; c++) {
            var tile = env.map[r] && env.map[r][c];
            if (!tile) continue; // VOID — пустота, просто фон

            if (type && type.indexOf(tile.type) === -1) continue;
            ctx.globalAlpha = 1;
            var x = c * env.TILE, y = r * env.TILE;
            if (tile.type === 'FLOOR' || tile.type === 'DOOR') {
            
                drawSprTransform(ctx, tile.sprite_type, x + (env.TILE / 2),y+ (env.TILE / 2), tile.sprite_flip_h,  tile.sprite_flip_v, 0, 1);
                
            } else if (tile.type === 'STAIRS') {
                
                drawSpr(ctx, 'next_floor',x + (env.TILE / 2),y+ (env.TILE / 2), 1);

            } 

            ctx.globalAlpha = 1;
        }
    }
}


  function drawAttackDir(){
    if(!env.player||env.player.hp<=0) return;
    // Don't show normal attack indicator during bow aiming
    if(env.player.bowAiming) return;
    var dc=env.player.lastDc,dr=env.player.lastDr;if(dc===0&&dr===0) return;
    var tc=env.player.c+dc,tr=env.player.r+dr;if(env.isWall(tc,tr)) return;
    var hasM=env.entities.some(function(e){return (e.isMonster&&!e.dead||e.isNpc)&&e.c===tc&&e.r===tr;});
    if(!hasM){
      ctx.fillStyle='rgba(255,255,180,0.06)';ctx.fillRect(tc*env.TILE,tr*env.TILE,env.TILE,env.TILE);
      ctx.fillStyle='rgba(255,255,180,0.18)';ctx.font='11px Courier New';ctx.textAlign='center';ctx.textBaseline='middle';
      var arr={'-1,0':'◀','1,0':'▶','0,-1':'▲','0,1':'▼'};
      ctx.fillText(arr[dc+','+dr]||'',tc*env.TILE+env.TILE/2,tr*env.TILE+env.TILE/2);
    }
  }

  function drawShadows(){
    if(env.player && env.player.hp>0)  env.player.drawShadow(ctx);
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(e.isMonster&&!e.dead) e.drawShadow(ctx);
    }
  }

  function drawMonsters(){
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(e.isMonster&&!e.dead) e.draw(ctx);
    }
  }

  function drawNpcs(){
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(!e.isNpc) continue;
      e.draw(ctx, e);
    }
  }

  function drawItems(){
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(!e.isItem) continue;
      e.draw(ctx);
    }
  }

  function drawCages(){
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      if(!e.isCage) continue;
      e.draw(ctx);
      
    }
  }

  function drawChests(){
    for(var i=0;i<env.entities.length;i++){
      var e=env.entities[i];
      
      if(!e.isChest) continue;
      
      if(e.broken) continue; // don't draw broken chests
      
      var px=e.x,py=e.y,sz=env.TILE*0.56;
      var half=sz/2;
      ctx.save();ctx.translate(px,py);
      drawSpr(ctx,e.opened?'chest_opened':'chest_clothed',0,0,sz);
      ctx.restore();
      if (!e.opened) env.drawInteractHint(e.c, e.r, px, py - half - 16);
    }
  }

  // ---- Resize & Loop ----
  function resize(){
    var w=document.getElementById('canvas-wrap');
    if(env.renderCfg.pixelPerfect){
      var rw=env.renderCfg.w,rh=env.renderCfg.h;
      if(canvas.width!==rw||canvas.height!==rh){canvas.width=rw;canvas.height=rh;}
      var sx=w.clientWidth/rw,sy=w.clientHeight/rh;
      var scale=Math.min(sx,sy);
      canvas.style.width=Math.max(1,Math.floor(rw*scale))+'px';
      canvas.style.height=Math.max(1,Math.floor(rh*scale))+'px';
    } else {
      canvas.style.width='100%';canvas.style.height='100%';
      if(canvas.width!==w.clientWidth||canvas.height!==w.clientHeight){canvas.width=w.clientWidth;canvas.height=w.clientHeight;}
    }
    ctx.imageSmoothingEnabled=false;
  }

  function loop(ts){
    var dt=Math.min((ts-lastTime)/1000,0.05);
    lastTime=ts;
    resize();update(dt);render();
    requestAnimationFrame(loop);
  }

  function centerCamera(){
    if(env.player){env.camera.setPos(env.player.x, env.player.y);}
    else{env.camera.setPos(env.cfg.mapW*env.TILE/2, env.cfg.mapH*env.TILE/2);}
  }
  
  function updateKeyStates(e, pressed) {
  
    var kTypes = Object.keys(KEY_GROUPS);
    for (var i = 0; i < kTypes.length; i++) {
        if(isKey(e, kTypes[i])) {
            keys[kTypes[i]]=pressed;
            return;
        }
    }
  }
  
  function resetKeys() {
    var kTypes = Object.keys(KEY_GROUPS);
    for (var i = 0; i < kTypes.length; i++) {
        keys[kTypes[i]]=false;
    }
  }
  
  function getMapPointFromClick(e) {
      var p = getCanvasPoint(canvas, e.clientX, e.clientY);
      var W = canvas.width, H = canvas.height;
      // Convert canvas point to world coordinates
      return {x : (p.x - W/2) / env.cfg.zoom + env.camera.x,
              y : (p.y - H/2) / env.cfg.zoom + env.camera.y
             };
  }

  // ---- Input ----
  function bindEvents(){
    window.addEventListener('keydown',function(e){
   
      updateKeyStates(e, true);
      if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    
      if(e.repeat) return;
           
        if (env.player && env.player.bowAiming) {          
            if(keys['up']){env.player.bowAimDir(0,env.player.facing);}
            else if(keys['down']){env.player.bowAimDir(0, env.player.facing * -1);}
            else if(keys['left']){env.player.bowAimDir(-1,0);}
            else if(keys['right']){env.player.bowAimDir(1,0);}
         
        }
        
      // ---- Main Menu ----
      if(env.modal==='mainmenu'){
        var menuItems = ['НОВАЯ ИГРА', 'УПРАВЛЕНИЕ'];
        if(keys['up']) env.menuState.mainMenu=(env.menuState.mainMenu-1+menuItems.length)%menuItems.length;
        else if(keys['down']) env.menuState.mainMenu=(env.menuState.mainMenu+1)%menuItems.length;
        else if(keys['confirm']){
          if(env.menuState.mainMenu===0){ newGame(); }
          else if(env.menuState.mainMenu===1){ env.modal='controls'; }
        }
        return;
      }

      // ---- Controls screen ----
      if(env.modal==='controls'){
        if(keys['cancel']) env.modal='mainmenu';
        return;
      }

      // ---- Dialogue consumes keys first ----
      if(dlg.active){
        if(keys['up']) dlg.onUp();
        else if(keys['down']) dlg.onDown();
        else if(keys['confirm']) dlg.onConfirm();
        else if(keys['cancel']) dlg.close();
        return;
      }

      // ---- Win/Lose menu ----
      if(env.modal==='gameover'||env.modal==='win'){
        if(keys['cancel']) env.modalTimer = 0;
        if (env.modalTimer > 0) return;
        var items = env._winMenuItems || [];
        if(keys['up']||keys['left']) env.menuState.winLose=Math.max(0,env.menuState.winLose-1);
        else if(keys['down']||keys['right']) env.menuState.winLose=Math.min(items.length-1,env.menuState.winLose+1);
        else if(keys['confirm']){
          var sel=items[env.menuState.winLose]||'';
          if(sel.includes('Следующий')){ floorNum++; env.player=null; generate(); }
          else if(sel.includes('Рестарт')){ restart(); }
          else if(sel.includes('Главное')){ env.modal='mainmenu'; env.menuState.mainMenu=0; }
        }
        return;
      }

      // ---- Pause menu ----
      if(env.modal==='pause'){
        if(keys['up']) env.menuState.pauseMenu=(env.menuState.pauseMenu-1+PAUSE_ITEMS.length)%PAUSE_ITEMS.length;
        else if(keys['down']) env.menuState.pauseMenu=(env.menuState.pauseMenu+1)%PAUSE_ITEMS.length;
        else if(keys['confirm']) executePauseItem();
        else if(keys['cancel']) closePause();
        return;
      }

      // ---- Inventory ----
      if(env.modal==='inventory'){
        if(keys['cancel']||keys['inventory']) closeModal();
        else if(keys['up']||keys['left']) env.invSelection=Math.max(0,(env.invSelection||0)-1);
        else if(keys['down']||keys['right']) env.invSelection=Math.min(Math.max(0,env.canvasButtons.length-1),(env.invSelection||0)+1);
        else if(keys['confirm']){
          var bSel = env.canvasButtons[env.invSelection||0];
          if(bSel && bSel.action) bSel.action();
        }
        return;
      }

      // ---- Normal gameplay ----
      if(keys['cancel']) {
        if(env.player && env.player.bowAiming){ env.player.bowAiming=false; env.addLog('Прицел отменён','info'); }
        else openPause();
      }
      else if(keys['shoot']) tryShoot();
      else if(keys['confirm']) tryInteractOrAttack();
      else if(keys['inventory']) openInventory();
      else if(e.code==='Digit1') quickEquipWeapon('sword');
      else if(e.code==='Digit2') quickEquipWeapon('bow');
      else if(e.code==='Digit3') quickEquipWeapon('staff');
      else if(e.code==='Digit4') quickUsePotion();
      else if (e.code==='Digit0') freeCameraMode = !freeCameraMode;
      
    });

    window.addEventListener('keyup',function(e){
      updateKeyStates(e, false);
    });

    // Click on canvas for inventory buttons OR bow aim shoot
    canvas.addEventListener('mousedown',function(e){
      e.preventDefault();
      if(env.modal==='inventory'){
        var p=getCanvasPoint(canvas, e.clientX,e.clientY);
        for(var i=0;i<env.canvasButtons.length;i++){
          var b=env.canvasButtons[i];
          if(p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h){
            b.action();
            return;
          }
        }
      }
      // Right click or any click while aiming: shoot
      if(env.player && env.player.isRangedWeapon() && !env.modal){
        env.player.enterAim();      
        var point = getMapPointFromClick(e);
        env.player.bowAimMouse(point.x, point.y);
        env.player.rangedShoot();
      }
    });

    // Mouse move: update bow aim angle
    canvas.addEventListener('mousemove', function(e){
      if(!env.player || !env.player.bowAiming) return;
      var point = getMapPointFromClick(e);
      env.player.bowAimMouse(point.x, point.y);
    });

    canvas.addEventListener('wheel',function(e){
      e.preventDefault();
      env.cfg.zoom=Math.max(0.5,Math.min(3.0,env.cfg.zoom+(e.deltaY>0?-0.1:0.1)));
    },{passive:false});

    canvas.addEventListener('contextmenu',function(e){e.preventDefault();});
  }

  function executePauseItem(){
    var item=PAUSE_ITEMS[env.menuState.pauseMenu];
    if(item==='ПРОДОЛЖИТЬ') closePause();
    else if(item==='НОВЫЙ ЭТАЖ'){ closePause(); generate(); }
    else if(item==='РЕСТАРТ'){ closePause(); restart(); }
    else if(item==='ГЛАВНОЕ МЕНЮ'){ env.modal='mainmenu'; env.menuState.mainMenu=0; }
  }

  // ---- Public API ----
  env.generate = generate;
  env.restart  = restart;
  env.newGame  = newGame;

  // ---- Init ----
  function initResources(onReady){
    var awaitNum=0;
    var sTypes=Object.keys(SPRITES);
    var onLoadResource=function(){awaitNum--;if(awaitNum<=0)onReady();};
    for(var i=0;i<sTypes.length;i++){
      var sprite=SPRITES[sTypes[i]];
      if(typeof sprite.imgSrc==='undefined'||!sprite) continue;
      awaitNum++;
      sprite.img=document.createElement('IMG');
      sprite.img.src='data/sprites/'+sprite.imgSrc;
      sprite.img.onload=onLoadResource;
      sprite.img.onerror=onLoadResource;
    }
    awaitNum++;
    SpritePlayer.importJSONAnim(playerAnim,function(animObject){
      env.PLAYER_TPL.animObject=animObject;
      env.PLAYER_TPL.animController=SpritePlayer(env.PLAYER_TPL.animObject.project,'idle',env.PLAYER_TPL.animObject.images);
      onLoadResource();
    });   
    awaitNum++;
    SpritePlayer.importJSONAnim(playerAnim_bow,function(animObject){
      env.PLAYER_TPL.animBowObject=animObject;
      env.PLAYER_TPL.animBowController=SpritePlayer(env.PLAYER_TPL.animBowObject.project,'prepare',env.PLAYER_TPL.animBowObject.images);
      onLoadResource();
    });
    awaitNum++;
    SpritePlayer.importJSONAnim(fairyAnim,function(animObject){
      env.FAIRY_TPL.animObject=animObject;
      env.FAIRY_TPL.animController=SpritePlayer(env.FAIRY_TPL.animObject.project,'idle',env.FAIRY_TPL.animObject.images);
      onLoadResource();
    });
    
  }

  initResources(function(){
    console.log('ready');
    gameUI = new GameUI(env, ctx, canvas);
    resize();
    bindEvents();
    // Start at main menu, don't generate yet
    console.log(env.modalTimer);
    lastTime=performance.now();
    requestAnimationFrame(loop);
  });

  return env;

})();
</script>
